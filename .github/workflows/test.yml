name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  offline-integration:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Verify install, reset, routing config, and demo fixture
        run: bash tests/run.sh
